name: publish-container-image

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ github.repository }}
  VERSION: ${{ steps.get_version.outputs.version }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - name: Get Python package version
        id: get_version
        run: |
          VERSION=$(cat indicate_data_exchange_client/__init__.py | sed -Ee 's/__version__ *= *(.*) */\1/')
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build the Docker image
        run: |
          docker build -t ghcr.io/${{ env.IMAGE_NAME }}:${{ env.VERSION }} -f Containerfile .
          docker tag -t ghcr.io/${{ env.IMAGE_NAME }}:${{ env.VERSION }} ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push the Docker image
        run: |
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest
